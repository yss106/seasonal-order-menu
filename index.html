<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#e85d3f">
  <meta name="description" content="武汉真实菜品、门店与参考价格对比">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css?v=2">
  <title>武汉寻味 · 菜品门店比价</title>
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="topbar">
        <div>
          <p class="eyebrow">武汉真实菜品比价</p>
          <h1>武汉寻味</h1>
        </div>
        <button class="table-pill" id="tableButton" aria-label="当前城市">武汉市⌄</button>
      </div>
      <div class="season-card">
        <div class="season-icon" id="seasonIcon">🌿</div>
        <div>
          <p class="season-kicker" id="dateText"></p>
          <h2 id="seasonTitle"></h2>
          <p id="seasonDescription"></p>
        </div>
      </div>
      <div class="search-wrap">
        <span>⌕</span>
        <input id="searchInput" type="search" placeholder="搜索菜名或食材" autocomplete="off">
      </div>
    </header>

    <main>
      <section class="recommendation">
        <div class="section-heading">
          <div>
            <span class="tiny-label">CHEF'S PICK</span>
            <h2>当季值得吃</h2>
          </div>
          <span class="fresh-badge">时令鲜味</span>
        </div>
        <div class="featured-scroll" id="featuredList"></div>
      </section>

      <nav class="category-tabs" id="categoryTabs" aria-label="菜品分类"></nav>

      <section class="menu-section">
        <div class="section-heading compact">
          <div>
            <span class="tiny-label">WUHAN FOOD GUIDE</span>
            <h2 id="menuTitle">武汉可吃到</h2>
          </div>
          <span class="dish-count" id="dishCount"></span>
        </div>
        <div class="dish-list" id="dishList"></div>
        <div class="empty-state hidden" id="emptyState">
          <div>🍽️</div>
          <h3>没有找到这道菜</h3>
          <p>换个关键词试试吧</p>
        </div>
      </section>
    </main>

  </div>

  <div class="modal-backdrop hidden" id="detailModal">
    <section class="cart-sheet detail-sheet" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
      <div class="sheet-handle"></div>
      <div class="sheet-heading">
        <div>
          <span class="tiny-label">武汉门店比价</span>
          <h2 id="detailTitle">菜品详情</h2>
        </div>
        <button id="closeDetail" aria-label="关闭">×</button>
      </div>
      <div id="detailContent"></div>
    </section>
  </div>

  <div class="toast hidden" id="toast">价格仅供参考，请以门店当日菜单为准</div>
  <script src="app.js?v=2"></script>
</body>
</html>
